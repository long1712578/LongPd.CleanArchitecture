version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: clean_arch_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: CleanArchitectureApp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: clean_arch_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 3. Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: clean_arch_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    restart: unless-stopped

  # 4. Prometheus (Metrics Scraping)
  prometheus:
    image: prom/prometheus:latest
    container_name: clean_arch_prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090" # Prometheus UI
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 5. Grafana (Observability Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: clean_arch_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000" # Grafana UI
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
